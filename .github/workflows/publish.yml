name: Publish to GitHub Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x # Or the version you prefer

      - name: Restore dependencies
        run: dotnet restore MiniUow/MiniUow.csproj

      - name: Build
        run: dotnet build MiniUow/MiniUow.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack MiniUow/MiniUow.csproj --configuration Release --no-build --output nupkg

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push nupkg/*.nupkg \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }}
